services:
  - type: web
    name: sakthi-dental-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "Sakthi Dental Clinic <onboarding@resend.dev>"
      - key: CLINIC_EMAIL
        value: sakthidentalclinic2004@gmail.com
      - key: ALLOWED_ORIGINS
        sync: false
